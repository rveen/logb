  <circle class="le" cx="632.8" cy="197.8" r="2.6"/>
  <circle class="le" cx="646.7" cy="187.0" r="2.6"/>
  <circle class="le" cx="660.6" cy="176.1" r="2.6"/>
  <circle class="le" cx="674.5" cy="165.2" r="2.6"/>
  <circle class="le" cx="688.4" cy="154.3" r="2.6"/>
  <circle class="le" cx="702.3" cy="143.5" r="2.6"/>
  <circle class="le" cx="716.3" cy="132.6" r="2.6"/>
  <circle class="le" cx="730.2" cy="121.7" r="2.6"/>
  <circle class="le" cx="744.1" cy="110.9" r="2.6"/>
  <circle class="le" cx="758.0" cy="100.0" r="2.6"/>
  <text class="t mut" x="598.0" y="376" font-size="11" text-anchor="middle">bit 0 of the signal &#8594; bit 23</text>
  <text class="mut" x="58" y="408" font-size="10.5">23 22 ... 16 &#8594; 31 30 ... 24 &#8594; 39 38 ... 32   (descend, jump)</text>
  <text class="mut" x="438" y="408" font-size="10.5">16 17 18 19 20 21 22 ... 39   (just count)</text>
</svg>
