<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 511" width="880" height="511" role="img" aria-label="The seven conversion forms">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="511"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">Conversion — a tagged struct: one type byte, then type-specific parameters</text>
  <text class="t mut" x="40" y="49" font-size="12">Raw bits stay raw on disk; the conversion says how to read them. A type byte outside 0..6 is a corrupt schema, not a</text>
  <text class="t mut" x="40" y="66" font-size="12">skippable unknown — there is no length to skip by.</text>
  <rect class="cell k5" x="40.0" y="95" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="112.0" font-size="11.5" text-anchor="middle">00</text>
  <text class="mut" x="79.0" y="126.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell cell dash" x="120.0" y="95" width="718.0" height="40" rx="3"/>
  <text class="fg" x="479.0" y="119.0" font-size="11.5" text-anchor="middle">identity — no parameters</text>
  <rect class="cell k5" x="40.0" y="145" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="162.0" font-size="11.5" text-anchor="middle">01</text>
  <text class="mut" x="79.0" y="176.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell k2" x="120.0" y="145" width="158.0" height="40" rx="3"/>
  <text class="fg" x="199.0" y="162.0" font-size="11.5" text-anchor="middle">a</text>
  <text class="mut" x="199.0" y="176.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell k2" x="280.0" y="145" width="158.0" height="40" rx="3"/>
  <text class="fg" x="359.0" y="162.0" font-size="11.5" text-anchor="middle">b</text>
  <text class="mut" x="359.0" y="176.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell cell dash" x="440.0" y="145" width="398.0" height="40" rx="3"/>
  <text class="fg" x="639.0" y="169.0" font-size="11.5" text-anchor="middle">linear:  a + b·x</text>
  <rect class="cell k5" x="40.0" y="195" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="212.0" font-size="11.5" text-anchor="middle">02</text>
  <text class="mut" x="79.0" y="226.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell k2" x="120.0" y="195" width="91.3" height="40" rx="3"/>
  <text class="fg" x="165.7" y="212.0" font-size="11.5" text-anchor="middle">p1</text>
  <text class="mut" x="165.7" y="226.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell k2" x="213.3" y="195" width="91.3" height="40" rx="3"/>
  <text class="fg" x="259.0" y="212.0" font-size="11.5" text-anchor="middle">p2</text>
  <text class="mut" x="259.0" y="226.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell k2" x="306.7" y="195" width="91.3" height="40" rx="3"/>
  <text class="fg" x="352.3" y="212.0" font-size="11.5" text-anchor="middle">p3</text>
  <text class="mut" x="352.3" y="226.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell k2" x="400.0" y="195" width="91.3" height="40" rx="3"/>
  <text class="fg" x="445.7" y="212.0" font-size="11.5" text-anchor="middle">p4</text>
  <text class="mut" x="445.7" y="226.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell k2" x="493.3" y="195" width="91.3" height="40" rx="3"/>
  <text class="fg" x="539.0" y="212.0" font-size="11.5" text-anchor="middle">p5</text>
  <text class="mut" x="539.0" y="226.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell k2" x="586.7" y="195" width="91.3" height="40" rx="3"/>
  <text class="fg" x="632.3" y="212.0" font-size="11.5" text-anchor="middle">p6</text>
  <text class="mut" x="632.3" y="226.0" font-size="10" text-anchor="middle">f64</text>
  <rect class="cell cell dash" x="680.0" y="195" width="158.0" height="40" rx="3"/>
  <text class="fg" x="759.0" y="219.0" font-size="11.5" text-anchor="middle">rational</text>
  <rect class="cell k5" x="40.0" y="245" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="262.0" font-size="11.5" text-anchor="middle">03</text>
  <text class="mut" x="79.0" y="276.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell k1" x="120.0" y="245" width="91.3" height="40" rx="3"/>
  <text class="fg" x="165.7" y="262.0" font-size="11.5" text-anchor="middle">n</text>
  <text class="mut" x="165.7" y="276.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k2 dash" x="213.3" y="245" width="398.0" height="40" rx="3"/>
  <text class="fg" x="412.3" y="262.0" font-size="11.5" text-anchor="middle">table-entry × n</text>
  <text class="mut" x="412.3" y="276.0" font-size="10" text-anchor="middle">&lt;f64&gt; key, &lt;f64&gt; val</text>
  <rect class="cell cell dash" x="613.3" y="245" width="224.7" height="40" rx="3"/>
  <text class="fg" x="725.7" y="269.0" font-size="11.5" text-anchor="middle">lookup, no interpolation</text>
  <rect class="cell k5" x="40.0" y="295" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="312.0" font-size="11.5" text-anchor="middle">04</text>
  <text class="mut" x="79.0" y="326.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell k1" x="120.0" y="295" width="91.3" height="40" rx="3"/>
  <text class="fg" x="165.7" y="312.0" font-size="11.5" text-anchor="middle">n</text>
  <text class="mut" x="165.7" y="326.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k2 dash" x="213.3" y="295" width="398.0" height="40" rx="3"/>
  <text class="fg" x="412.3" y="312.0" font-size="11.5" text-anchor="middle">table-entry × n</text>
  <text class="mut" x="412.3" y="326.0" font-size="10" text-anchor="middle">&lt;f64&gt; key, &lt;f64&gt; val</text>
  <rect class="cell cell dash" x="613.3" y="295" width="224.7" height="40" rx="3"/>
  <text class="fg" x="725.7" y="319.0" font-size="11.5" text-anchor="middle">lookup, interpolated</text>
  <rect class="cell k5" x="40.0" y="345" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="362.0" font-size="11.5" text-anchor="middle">05</text>
  <text class="mut" x="79.0" y="376.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell k1" x="120.0" y="345" width="91.3" height="40" rx="3"/>
  <text class="fg" x="165.7" y="362.0" font-size="11.5" text-anchor="middle">n</text>
  <text class="mut" x="165.7" y="376.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k3 dash" x="213.3" y="345" width="344.7" height="40" rx="3"/>
  <text class="fg" x="385.7" y="362.0" font-size="11.5" text-anchor="middle">v2t-entry × n</text>
  <text class="mut" x="385.7" y="376.0" font-size="10" text-anchor="middle">&lt;f64&gt; key, &lt;string&gt; text</text>
  <rect class="cell k3 dash" x="560.0" y="345" width="131.3" height="40" rx="3"/>
  <text class="fg" x="625.7" y="362.0" font-size="11.5" text-anchor="middle">default</text>
  <text class="mut" x="625.7" y="376.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <rect class="cell cell dash" x="693.3" y="345" width="144.7" height="40" rx="3"/>
  <text class="fg" x="765.7" y="369.0" font-size="11.5" text-anchor="middle">value to text</text>
  <rect class="cell k5" x="40.0" y="395" width="78.0" height="40" rx="3"/>
  <text class="fg" x="79.0" y="412.0" font-size="11.5" text-anchor="middle">06</text>
  <text class="mut" x="79.0" y="426.0" font-size="10" text-anchor="middle">type</text>
  <rect class="cell k1" x="120.0" y="395" width="91.3" height="40" rx="3"/>
  <text class="fg" x="165.7" y="412.0" font-size="11.5" text-anchor="middle">n</text>
  <text class="mut" x="165.7" y="426.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k3 dash" x="213.3" y="395" width="344.7" height="40" rx="3"/>
  <text class="fg" x="385.7" y="412.0" font-size="11.5" text-anchor="middle">r2t-entry × n</text>
  <text class="mut" x="385.7" y="426.0" font-size="10" text-anchor="middle">&lt;f64&gt; lo, &lt;f64&gt; hi, &lt;string&gt; text</text>
  <rect class="cell k3 dash" x="560.0" y="395" width="131.3" height="40" rx="3"/>
  <text class="fg" x="625.7" y="412.0" font-size="11.5" text-anchor="middle">default</text>
  <text class="mut" x="625.7" y="426.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <rect class="cell cell dash" x="693.3" y="395" width="144.7" height="40" rx="3"/>
  <text class="fg" x="765.7" y="419.0" font-size="11.5" text-anchor="middle">range to text</text>
  <text class="t mut" x="40" y="461" font-size="11.5">Every {n} takes its count from the u32 immediately preceding it. A non-identity conversion on a bytes or string field is</text>
  <text class="t mut" x="40" y="478" font-size="11.5">rejected — the schema, not the value. For complex, only identity, linear, and rational are valid.</text>
</svg>
