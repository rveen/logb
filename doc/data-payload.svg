<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 338" width="880" height="338" role="img" aria-label="The DATA frame payload">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="338"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">DATA — 0x20 — a batch of records</text>
  <text class="t mut" x="40" y="49" font-size="12">&lt;data-payload&gt; ::= &lt;axis-base&gt; &lt;record-count&gt; &lt;run-id&gt; &lt;codec&gt; &lt;filter&gt; &lt;reserved16&gt; &lt;raw-size&gt; &lt;records&gt;</text>
  <rect class="cell k2" x="40.0" y="90" width="138.2" height="48" rx="3"/>
  <text class="mut" x="40.0" y="85" font-size="9.5">+0</text>
  <text class="fg" x="109.1" y="111.0" font-size="11.5" text-anchor="middle">axis_base</text>
  <text class="mut" x="109.1" y="125.0" font-size="10" text-anchor="middle">i64 ticks or f64</text>
  <rect class="cell k1" x="180.2" y="90" width="105.2" height="48" rx="3"/>
  <text class="mut" x="180.2" y="85" font-size="9.5">+8</text>
  <text class="fg" x="232.8" y="111.0" font-size="11.5" text-anchor="middle">record_count</text>
  <text class="mut" x="232.8" y="125.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k1" x="287.4" y="90" width="80.5" height="48" rx="3"/>
  <text class="mut" x="287.4" y="85" font-size="9.5">+12</text>
  <text class="fg" x="327.7" y="111.0" font-size="11.5" text-anchor="middle">run_id</text>
  <text class="mut" x="327.7" y="125.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k5" x="369.9" y="90" width="64.0" height="48" rx="3"/>
  <text class="mut" x="369.9" y="85" font-size="9.5">+16</text>
  <text class="fg" x="401.9" y="111.0" font-size="11.5" text-anchor="middle">codec</text>
  <text class="mut" x="401.9" y="125.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell k5" x="435.9" y="90" width="64.0" height="48" rx="3"/>
  <text class="mut" x="435.9" y="85" font-size="9.5">+17</text>
  <text class="fg" x="467.9" y="111.0" font-size="11.5" text-anchor="middle">filter</text>
  <text class="mut" x="467.9" y="125.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell cell" x="501.9" y="90" width="47.5" height="48" rx="3"/>
  <text class="mut" x="501.9" y="85" font-size="9.5">+18</text>
  <text class="fg" x="525.6" y="111.0" font-size="11.5" text-anchor="middle">rsv</text>
  <text class="mut" x="525.6" y="125.0" font-size="10" text-anchor="middle">u16</text>
  <rect class="cell k1" x="551.3" y="90" width="88.7" height="48" rx="3"/>
  <text class="mut" x="551.3" y="85" font-size="9.5">+20</text>
  <text class="fg" x="595.7" y="111.0" font-size="11.5" text-anchor="middle">raw_size</text>
  <text class="mut" x="595.7" y="125.0" font-size="10" text-anchor="middle">u64</text>
  <rect class="cell k4 dash" x="642.1" y="90" width="195.9" height="48" rx="3"/>
  <text class="mut" x="642.1" y="85" font-size="9.5">+28</text>
  <text class="fg" x="740.0" y="111.0" font-size="11.5" text-anchor="middle">records</text>
  <text class="mut" x="740.0" y="125.0" font-size="10" text-anchor="middle">to end of payload</text>
  <text class="mut" x="40" y="162" font-size="11">codec: 0 none · 1 zstd (the default) · 2 lz4 · 3 deflate.   filter: 0 none · 1 transpose.   raw_size is the decoded size,</text>
  <text class="mut" x="40" y="179" font-size="11">for a one-shot allocation.</text>
  <text class="t mut" x="40" y="208" font-size="11.5">A reader that meets a codec or filter it does not know MUST reject that frame and MUST NOT return its records — unlike an</text>
  <text class="t mut" x="40" y="225" font-size="11.5">unknown frame type, which is skippable because its meaning is unknown. Because each frame carries its own axis_base and</text>
  <text class="t mut" x="40" y="242" font-size="11.5">run_id, a DATA frame is independently decodable given its schema, and that is what makes resynchronisation work.</text>
  <text class="t l1" x="40" y="271" font-size="11.5">payload_len sits in the frame header and crc32c in the tail, so the batch must be complete before the first byte is written. A</text>
  <text class="t l1" x="40" y="288" font-size="11.5">writer therefore accumulates records in memory and emits a whole frame at once: batching is not an optimisation here, it is</text>
  <text class="t l1" x="40" y="305" font-size="11.5">the unit in which the format is written.</text>
</svg>
