<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 272" width="880" height="272" role="img" aria-label="The 16-byte Logb file header">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="272"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">File header — 16 bytes, written once</text>
  <text class="t mut" x="40" y="49" font-size="12">&lt;file-header&gt; ::= &lt;magic&gt; &lt;version-major&gt; &lt;version-minor&gt; &lt;header-crc&gt;</text>
  <rect class="cell k5" x="40.0" y="90" width="318.0" height="48" rx="3"/>
  <text class="mut" x="40.0" y="85" font-size="9.5">+0</text>
  <text class="fg" x="199.0" y="111.0" font-size="11.5" text-anchor="middle">magic</text>
  <text class="mut" x="199.0" y="125.0" font-size="10" text-anchor="middle">8 bytes</text>
  <rect class="cell k1" x="360.0" y="90" width="158.0" height="48" rx="3"/>
  <text class="mut" x="360.0" y="85" font-size="9.5">+8</text>
  <text class="fg" x="439.0" y="111.0" font-size="11.5" text-anchor="middle">version_major</text>
  <text class="mut" x="439.0" y="125.0" font-size="10" text-anchor="middle">u16 = 0</text>
  <rect class="cell k1" x="520.0" y="90" width="158.0" height="48" rx="3"/>
  <text class="mut" x="520.0" y="85" font-size="9.5">+10</text>
  <text class="fg" x="599.0" y="111.0" font-size="11.5" text-anchor="middle">version_minor</text>
  <text class="mut" x="599.0" y="125.0" font-size="10" text-anchor="middle">u16 = 1</text>
  <rect class="cell k4" x="680.0" y="90" width="158.0" height="48" rx="3"/>
  <text class="mut" x="680.0" y="85" font-size="9.5">+12</text>
  <text class="fg" x="759.0" y="111.0" font-size="11.5" text-anchor="middle">header_crc</text>
  <text class="mut" x="759.0" y="125.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k5" x="40.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="59.0" y="173.0" font-size="11" text-anchor="middle">89</text>
  <rect class="cell k5" x="80.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="99.0" y="173.0" font-size="11" text-anchor="middle">4C</text>
  <rect class="cell k5" x="120.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="139.0" y="173.0" font-size="11" text-anchor="middle">4F</text>
  <rect class="cell k5" x="160.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="179.0" y="173.0" font-size="11" text-anchor="middle">47</text>
  <rect class="cell k5" x="200.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="219.0" y="173.0" font-size="11" text-anchor="middle">42</text>
  <rect class="cell k5" x="240.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="259.0" y="173.0" font-size="11" text-anchor="middle">0D</text>
  <rect class="cell k5" x="280.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="299.0" y="173.0" font-size="11" text-anchor="middle">0A</text>
  <rect class="cell k5" x="320.0" y="154" width="38.0" height="30" rx="3"/>
  <text class="fg" x="339.0" y="173.0" font-size="11" text-anchor="middle">1A</text>
  <text class="mut" x="40" y="200.0" font-size="10.5">\x89  L  O  G  B  \r  \n  \x1a  &#8212; the PNG trick: byte 0 is non-ASCII, and CR LF EOF catch a text-mode transfer that mangled the file</text>
  <text class="t mut" x="40" y="222" font-size="11.5">header_crc covers bytes 0..11. An unknown version_major is rejected; an unknown higher version_minor is accepted and its</text>
  <text class="t mut" x="40" y="239" font-size="11.5">unknown frames skipped.</text>
</svg>
