      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect
     class="bg"
     width="880"
     height="419"
     id="rect1" />
  <text
     class="t fg"
     x="40"
     y="30"
     font-size="15"
     font-weight="600"
     id="text1">A Logb file</text>
  <text
     class="t mut"
     x="40"
     y="49"
     font-size="12"
     id="text2">&lt;file&gt; ::= &lt;file-header&gt; &lt;segment&gt;* [ &lt;index-frame&gt; ] [ &lt;end-frame&gt; ]</text>
  <text
     class="t mut"
     x="40"
     y="66"
     font-size="12"
     id="text3">Nothing points forward, so the whole tail is effectively optional: a file cut at any byte still holds every complete</text>
  <text
     class="t mut"
     x="40"
     y="83"
     font-size="12"
     id="text4">frame before the cut.</text>
  <rect
     class="cell k5"
     x="40.0"
     y="112"
     width="131.3"
     height="48"
     rx="3"
     id="rect4" />
  <text
     class="fg"
     x="105.7"
     y="133.0"
     font-size="11.5"
     text-anchor="middle"
     id="text5">file-header</text>
  <text
     class="mut"
     x="105.7"
     y="147.0"
     font-size="10"
     text-anchor="middle"
     id="text6">16 bytes</text>
  <rect
     class="cell k1"
     x="173.3"
     y="112"
     width="410.1"
     height="48"
     rx="3"
     id="rect6" />
  <text
     class="fg"
     x="378.4"
     y="133.0"
     font-size="11.5"
     text-anchor="middle"
     id="text7">segment</text>
  <text
     class="mut"
     x="378.4"
     y="147.0"
     font-size="10"
     text-anchor="middle"
     id="text8">one or more</text>
  <rect
     class="cell k3 dash"
     x="585.5"
     y="112"
     width="131.3"
     height="48"
     rx="3"
     id="rect8" />
  <text
     class="fg"
     x="651.1"
     y="133.0"
     font-size="11.5"
     text-anchor="middle"
     id="text9">index-frame</text>
  <text
     class="mut"
     x="651.1"
     y="147.0"
     font-size="10"
     text-anchor="middle"
     id="text10">optional</text>
  <rect
     class="cell k3 dash"
     x="718.8"
     y="112"
     width="119.2"
     height="48"
     rx="3"
     id="rect10" />
  <text
     class="fg"
     x="778.4"
     y="133.0"
     font-size="11.5"
     text-anchor="middle"
     id="text11">end-frame</text>
  <text
     class="mut"
     x="778.4"
     y="147.0"
     font-size="10"
     text-anchor="middle"
     id="text12">optional</text>
  <text
     class="t mut"
     x="40"
     y="199"
     font-size="11.5"
     id="text13">&lt;segment&gt;  ::=  a resynchronisation point, its schemas, then bodies</text>
  <rect
     class="cell k1"
     x="40.0"
     y="208"
     width="171.3"
     height="48"
     rx="3"
     id="rect13" />
  <text
     class="fg"
     x="125.7"
     y="229.0"
     font-size="11.5"
     text-anchor="middle"
     id="text14">sync-frame</text>
  <text
     class="mut"
     x="125.7"
     y="243.0"
     font-size="10"
     text-anchor="middle"
     id="text15">0x01, exactly one</text>
  <rect
     class="cell k1"
     x="213.3"
     y="208"
     width="184.7"
     height="48"
     rx="3"
     id="rect15" />
  <text
     class="fg"
     x="305.7"
     y="229.0"
     font-size="11.5"
     text-anchor="middle"
     id="text16">schema-frame</text>
  <text
     class="mut"
     x="305.7"
     y="243.0"
     font-size="10"
     text-anchor="middle"
     id="text17">0x10, one or more</text>
  <rect
     class="cell k1 dash"
     x="400.0"
     y="208"
     width="171.3"
     height="48"
     rx="3"
     id="rect17" />
  <text
     class="fg"
     x="485.7"
     y="229.0"
     font-size="11.5"
     text-anchor="middle"
     id="text18">run-frame</text>
  <text
     class="mut"
     x="485.7"
     y="243.0"
     font-size="10"
     text-anchor="middle"
     id="text19">0x13, zero or more</text>
  <rect
     class="cell k2"
     x="573.3"
     y="208"
     width="264.7"
     height="48"
     rx="3"
     id="rect19" />
  <text
     class="fg"
     x="705.7"
     y="229.0"
     font-size="11.5"
     text-anchor="middle"
     id="text20">segment-body</text>
  <text
     class="mut"
     x="705.7"
     y="243.0"
     font-size="10"
     text-anchor="middle"
     id="text21">zero or more</text>
  <text
     class="t mut"
     x="40"
     y="283"
     font-size="11.5"
     id="text22">&lt;segment-body&gt;  ::=  in any order, any number of times</text>
  <rect
     class="cell k2"
     x="40.0"
     y="292"
     width="164.7"
     height="42"
     rx="3"
     id="rect22" />
  <text
     class="fg"
     x="122.3"
     y="310.0"
     font-size="11.5"
     text-anchor="middle"
     id="text23">meta-frame</text>
  <text
     class="mut"
     x="122.3"
     y="324.0"
     font-size="10"
     text-anchor="middle"
     id="text24">0x11</text>
  <rect
     class="cell k2"
     x="206.7"
     y="292"
     width="164.7"
     height="42"
     rx="3"
     id="rect24" />
  <text
     class="fg"
     x="289.0"
     y="310.0"
     font-size="11.5"
     text-anchor="middle"
     id="text25">attach-frame</text>
  <text
     class="mut"
     x="289.0"
     y="324.0"
     font-size="10"
     text-anchor="middle"
     id="text26">0x12</text>
  <rect
     class="cell k2"
     x="373.3"
     y="292"
     width="164.7"
     height="42"
     rx="3"
     id="rect26" />
  <text
     class="fg"
     x="455.7"
     y="310.0"
     font-size="11.5"
     text-anchor="middle"
     id="text27">data-frame</text>
  <text
     class="mut"
     x="455.7"
     y="324.0"
     font-size="10"
     text-anchor="middle"
     id="text28">0x20</text>
  <rect
     class="cell cell dash"
     x="540.0"
     y="292"
     width="298.0"
     height="42"
     rx="3"
     id="rect28" />
  <text
     class="fg"
     x="689.0"
     y="310.0"
     font-size="11.5"
     text-anchor="middle"
     id="text29">other-frame</text>
  <text
     class="mut"
     x="689.0"
     y="324.0"
     font-size="10"
     text-anchor="middle"
     id="text30">unknown type, skipped via payload_len</text>
  <text
     class="t mut"
     x="40"
     y="352"
     font-size="11.5"
     id="text31">A segment is the unit of recovery: schemas are rebound at every SYNC frame, so a reader that lands anywhere can scan forward</text>
  <text
     class="t mut"
     x="40"
     y="369"
     font-size="11.5"
     id="text32">to the next one and decode from there. Concatenation appends a second file minus its header — which is why an index or end</text>
  <text
     class="t mut"
     x="40"
     y="386"
     font-size="11.5"
     id="text33">frame may also turn up mid-file.</text>
</svg>
