<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 391" width="880" height="391" role="img" aria-label="The common shape of every Logb frame">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="391"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">Frame — every frame after the file header has this shape</text>
  <text class="t mut" x="40" y="49" font-size="12">&lt;frame&gt; ::= &lt;frame-header&gt; &lt;payload&gt; &lt;frame-crc&gt;</text>
  <text class="t mut" x="40" y="66" font-size="12">12 bytes of overhead. Frames are batches, not records, so this is noise.</text>
  <rect class="cell k1" x="40.0" y="107" width="113.0" height="48" rx="3"/>
  <text class="mut" x="40.0" y="102" font-size="9.5">+0</text>
  <text class="fg" x="96.5" y="128.0" font-size="11.5" text-anchor="middle">payload_len</text>
  <text class="mut" x="96.5" y="142.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k1" x="155.0" y="107" width="73.0" height="48" rx="3"/>
  <text class="mut" x="155.0" y="102" font-size="9.5">+4</text>
  <text class="fg" x="191.5" y="128.0" font-size="11.5" text-anchor="middle">frame_type</text>
  <text class="mut" x="191.5" y="142.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell k1" x="230.0" y="107" width="73.0" height="48" rx="3"/>
  <text class="mut" x="230.0" y="102" font-size="9.5">+5</text>
  <text class="fg" x="266.5" y="128.0" font-size="11.5" text-anchor="middle">flags</text>
  <text class="mut" x="266.5" y="142.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell k1" x="305.0" y="107" width="93.0" height="48" rx="3"/>
  <text class="mut" x="305.0" y="102" font-size="9.5">+6</text>
  <text class="fg" x="351.5" y="128.0" font-size="11.5" text-anchor="middle">stream_id</text>
  <text class="mut" x="351.5" y="142.0" font-size="10" text-anchor="middle">u16</text>
  <rect class="cell k2" x="400.0" y="107" width="338.0" height="48" rx="3"/>
  <text class="mut" x="400.0" y="102" font-size="9.5">+8</text>
  <text class="fg" x="569.0" y="128.0" font-size="11.5" text-anchor="middle">payload</text>
  <text class="mut" x="569.0" y="142.0" font-size="10" text-anchor="middle">payload_len bytes</text>
  <rect class="cell k4" x="740.0" y="107" width="98.0" height="48" rx="3"/>
  <text class="mut" x="740.0" y="102" font-size="9.5">+8+n</text>
  <text class="fg" x="789.0" y="128.0" font-size="11.5" text-anchor="middle">crc32c</text>
  <text class="mut" x="789.0" y="142.0" font-size="10" text-anchor="middle">u32</text>
  <path class="s4" d="M40.0 176.0 L40.0 183.0 L738.0 183.0 L738.0 176.0"/>
  <text class="l4" x="389.0" y="198.0" font-size="10.5" text-anchor="middle">crc32c is computed over all of this — header and payload both</text>
  <text class="t mut" x="40" y="217" font-size="11.5">A reader validates the CRC before trusting any payload byte. A frame whose CRC fails, or whose payload_len runs past end of</text>
  <text class="t mut" x="40" y="234" font-size="11.5">input, terminates the read there.</text>
  <text class="t fg" x="40" y="270" font-size="12.5" font-weight="600">frame_type selects the payload production</text>
  <rect class="cell k1" x="40.0" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="83.4" y="299.0" font-size="11.5" text-anchor="middle">SYNC</text>
  <text class="mut" x="83.4" y="313.0" font-size="10" text-anchor="middle">0x01</text>
  <rect class="cell k1" x="128.9" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="172.3" y="299.0" font-size="11.5" text-anchor="middle">SCHEMA</text>
  <text class="mut" x="172.3" y="313.0" font-size="10" text-anchor="middle">0x10</text>
  <rect class="cell k2" x="217.8" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="261.2" y="299.0" font-size="11.5" text-anchor="middle">META</text>
  <text class="mut" x="261.2" y="313.0" font-size="10" text-anchor="middle">0x11</text>
  <rect class="cell k2" x="306.7" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="350.1" y="299.0" font-size="11.5" text-anchor="middle">ATTACH</text>
  <text class="mut" x="350.1" y="313.0" font-size="10" text-anchor="middle">0x12</text>
  <rect class="cell k1" x="395.6" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="439.0" y="299.0" font-size="11.5" text-anchor="middle">RUN</text>
  <text class="mut" x="439.0" y="313.0" font-size="10" text-anchor="middle">0x13</text>
  <rect class="cell k2" x="484.4" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="527.9" y="299.0" font-size="11.5" text-anchor="middle">DATA</text>
  <text class="mut" x="527.9" y="313.0" font-size="10" text-anchor="middle">0x20</text>
  <rect class="cell k3" x="573.3" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="616.8" y="299.0" font-size="11.5" text-anchor="middle">INDEX</text>
  <text class="mut" x="616.8" y="313.0" font-size="10" text-anchor="middle">0x30</text>
  <rect class="cell k3" x="662.2" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="705.7" y="299.0" font-size="11.5" text-anchor="middle">END</text>
  <text class="mut" x="705.7" y="313.0" font-size="10" text-anchor="middle">0x40</text>
  <rect class="cell cell dash" x="751.1" y="281" width="86.9" height="42" rx="3"/>
  <text class="fg" x="794.6" y="299.0" font-size="11.5" text-anchor="middle">SIGN</text>
  <text class="mut" x="794.6" y="313.0" font-size="10" text-anchor="middle">0x50</text>
  <text class="t mut" x="40" y="341" font-size="11.5">0x50 is reserved and undefined in v0.1. Any other frame_type is legal and skipped using payload_len — that is the only</text>
  <text class="t mut" x="40" y="358" font-size="11.5">extension mechanism, and it is enough.</text>
</svg>
