<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 519" width="880" height="519" role="img" aria-label="The decoded record region of a DATA frame">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="519"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">Record region — what the records bytes hold after decompression and de-transposition</text>
  <text class="t mut" x="40" y="49" font-size="12">&lt;record-region&gt; ::= &lt;fixed&gt;{record_count} &lt;tail&gt;{record_count}</text>
  <rect class="cell k2" x="40.0" y="78" width="92.1" height="44" rx="3"/>
  <text class="fg" x="86.1" y="104.0" font-size="11.5" text-anchor="middle">fixed 0</text>
  <rect class="cell k2" x="134.1" y="78" width="92.1" height="44" rx="3"/>
  <text class="fg" x="180.2" y="104.0" font-size="11.5" text-anchor="middle">fixed 1</text>
  <rect class="cell k2" x="228.2" y="78" width="92.1" height="44" rx="3"/>
  <text class="fg" x="274.3" y="104.0" font-size="11.5" text-anchor="middle">fixed 2</text>
  <rect class="cell cell dash" x="322.4" y="78" width="54.5" height="44" rx="3"/>
  <text class="fg" x="349.6" y="104.0" font-size="11.5" text-anchor="middle">…</text>
  <rect class="cell k2" x="378.8" y="78" width="92.1" height="44" rx="3"/>
  <text class="fg" x="424.9" y="104.0" font-size="11.5" text-anchor="middle">fixed n-1</text>
  <rect class="cell k3 dash" x="472.9" y="78" width="101.5" height="44" rx="3"/>
  <text class="fg" x="523.7" y="104.0" font-size="11.5" text-anchor="middle">tail 0</text>
  <rect class="cell k3 dash" x="576.5" y="78" width="101.5" height="44" rx="3"/>
  <text class="fg" x="627.2" y="104.0" font-size="11.5" text-anchor="middle">tail 1</text>
  <rect class="cell cell dash" x="680.0" y="78" width="54.5" height="44" rx="3"/>
  <text class="fg" x="707.2" y="104.0" font-size="11.5" text-anchor="middle">…</text>
  <rect class="cell k3 dash" x="736.5" y="78" width="101.5" height="44" rx="3"/>
  <text class="fg" x="787.2" y="104.0" font-size="11.5" text-anchor="middle">tail n-1</text>
  <path class="s1" d="M40.0 137.0 L40.0 144.0 L470.9 144.0 L470.9 137.0"/>
  <text class="l1" x="255.5" y="159.0" font-size="10.5" text-anchor="middle">each ceil(record_bits / 8) bytes</text>
  <path class="s4" d="M472.9 137.0 L472.9 144.0 L838.0 144.0 L838.0 137.0"/>
  <text class="l4" x="655.5" y="159.0" font-size="10.5" text-anchor="middle">appended untransposed</text>
  <text class="t mut" x="40" y="200" font-size="11.5">filter=transpose covers the fixed region only. All fixed portions precede all tails; they are never interleaved. This is what</text>
  <text class="t mut" x="40" y="217" font-size="11.5">lets a reader seek to record i in a batch by multiplication — and it is why one variable-length field costs the batch its</text>
  <text class="t mut" x="40" y="234" font-size="11.5">seekability, since the tails must then be walked linearly.</text>
  <text class="t fg" x="40" y="272" font-size="12.5" font-weight="600">&lt;tail&gt; — one per record, only if the schema declares variable-length fields</text>
  <rect class="cell k1" x="40.0" y="283" width="93.5" height="42" rx="3"/>
  <text class="fg" x="86.8" y="301.0" font-size="11.5" text-anchor="middle">len</text>
  <text class="mut" x="86.8" y="315.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k3 dash" x="135.5" y="283" width="260.7" height="42" rx="3"/>
  <text class="fg" x="265.9" y="301.0" font-size="11.5" text-anchor="middle">bytes × len</text>
  <text class="mut" x="265.9" y="315.0" font-size="10" text-anchor="middle">first variable field</text>
  <rect class="cell k1" x="398.2" y="283" width="93.5" height="42" rx="3"/>
  <text class="fg" x="445.0" y="301.0" font-size="11.5" text-anchor="middle">len</text>
  <text class="mut" x="445.0" y="315.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k3 dash" x="493.7" y="283" width="260.7" height="42" rx="3"/>
  <text class="fg" x="624.1" y="301.0" font-size="11.5" text-anchor="middle">bytes × len</text>
  <text class="mut" x="624.1" y="315.0" font-size="10" text-anchor="middle">second variable field</text>
  <rect class="cell cell dash" x="756.4" y="283" width="81.6" height="42" rx="3"/>
  <text class="fg" x="797.2" y="308.0" font-size="11.5" text-anchor="middle">…</text>
  <text class="t mut" x="40" y="343" font-size="11">In field-declaration order. A field with no bytes writes a zero length; it is not omitted. An absent field — including one whose</text>
  <text class="t mut" x="40" y="360" font-size="11">guard is unsatisfied — still occupies its slot, because the tail must stay walkable without evaluating any guard.</text>
  <text class="t fg" x="40" y="398" font-size="12.5" font-weight="600">&lt;fixed&gt; — a bit field, not a byte structure</text>
  <rect class="cell k2" x="40.0" y="409" width="183.7" height="42" rx="3"/>
  <text class="fg" x="131.9" y="427.0" font-size="11.5" text-anchor="middle">field A</text>
  <text class="mut" x="131.9" y="441.0" font-size="10" text-anchor="middle">bits 0..11</text>
  <rect class="cell k2" x="225.7" y="409" width="126.6" height="42" rx="3"/>
  <text class="fg" x="289.0" y="427.0" font-size="11.5" text-anchor="middle">field B</text>
  <text class="mut" x="289.0" y="441.0" font-size="10" text-anchor="middle">bits 12..12</text>
  <rect class="cell k2" x="354.3" y="409" width="283.7" height="42" rx="3"/>
  <text class="fg" x="496.1" y="427.0" font-size="11.5" text-anchor="middle">field C</text>
  <text class="mut" x="496.1" y="441.0" font-size="10" text-anchor="middle">bits 13..28, may overlap</text>
  <rect class="cell cell dash" x="640.0" y="409" width="198.0" height="42" rx="3"/>
  <text class="fg" x="739.0" y="427.0" font-size="11.5" text-anchor="middle">padding</text>
  <text class="mut" x="739.0" y="441.0" font-size="10" text-anchor="middle">unused bits are legal</text>
  <text class="t mut" x="40" y="469" font-size="11">Fields are placed by bit_offset and bit_width. They need not be byte-aligned and they may overlap. The grammar cannot express this</text>
  <text class="t mut" x="40" y="486" font-size="11">layer; SPEC.md §6.2’s conformance vectors are the specification for it.</text>
</svg>
