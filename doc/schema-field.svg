<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 523" width="880" height="523" role="img" aria-label="The layout of one field inside a SCHEMA payload">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="523"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">Field — repeated field_count times inside a SCHEMA payload</text>
  <text class="t mut" x="40" y="49" font-size="12">&lt;field&gt; ::= &lt;field-name&gt; &lt;bit-offset&gt; &lt;bit-width&gt; &lt;data-type&gt; &lt;byte-order&gt; &lt;field-flags&gt;</text>
  <text class="t mut" x="40" y="66" font-size="12">            &lt;unit&gt; &lt;desc&gt; &lt;conversion&gt; [ &lt;guard-field&gt; &lt;guard-value&gt; ] &lt;kv&gt;</text>
  <rect class="cell k3 dash" x="40.0" y="95" width="203.4" height="48" rx="3"/>
  <text class="fg" x="141.7" y="116.0" font-size="11.5" text-anchor="middle">field_name</text>
  <text class="mut" x="141.7" y="130.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <rect class="cell k1" x="245.4" y="95" width="127.7" height="48" rx="3"/>
  <text class="fg" x="309.3" y="116.0" font-size="11.5" text-anchor="middle">bit_offset</text>
  <text class="mut" x="309.3" y="130.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k1" x="375.1" y="95" width="127.7" height="48" rx="3"/>
  <text class="fg" x="439.0" y="116.0" font-size="11.5" text-anchor="middle">bit_width</text>
  <text class="mut" x="439.0" y="130.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k2" x="504.9" y="95" width="106.1" height="48" rx="3"/>
  <text class="fg" x="557.9" y="116.0" font-size="11.5" text-anchor="middle">data_type</text>
  <text class="mut" x="557.9" y="130.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell k2" x="613.0" y="95" width="111.5" height="48" rx="3"/>
  <text class="fg" x="668.7" y="116.0" font-size="11.5" text-anchor="middle">byte_order</text>
  <text class="mut" x="668.7" y="130.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell k2" x="726.5" y="95" width="111.5" height="48" rx="3"/>
  <text class="fg" x="782.2" y="116.0" font-size="11.5" text-anchor="middle">field_flags</text>
  <text class="mut" x="782.2" y="130.0" font-size="10" text-anchor="middle">u8</text>
  <rect class="cell k3 dash" x="40.0" y="159" width="129.6" height="48" rx="3"/>
  <text class="fg" x="104.8" y="180.0" font-size="11.5" text-anchor="middle">unit</text>
  <text class="mut" x="104.8" y="194.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <rect class="cell k3 dash" x="171.6" y="159" width="129.6" height="48" rx="3"/>
  <text class="fg" x="236.5" y="180.0" font-size="11.5" text-anchor="middle">desc</text>
  <text class="mut" x="236.5" y="194.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <rect class="cell k2 dash" x="303.3" y="159" width="190.4" height="48" rx="3"/>
  <text class="fg" x="398.5" y="180.0" font-size="11.5" text-anchor="middle">conversion</text>
  <text class="mut" x="398.5" y="194.0" font-size="10" text-anchor="middle">tagged, see below</text>
  <rect class="cell k4 dash" x="495.7" y="159" width="109.4" height="48" rx="3"/>
  <text class="fg" x="550.4" y="180.0" font-size="11.5" text-anchor="middle">guard_field</text>
  <text class="mut" x="550.4" y="194.0" font-size="10" text-anchor="middle">u16</text>
  <rect class="cell k4 dash" x="607.1" y="159" width="109.4" height="48" rx="3"/>
  <text class="fg" x="661.8" y="180.0" font-size="11.5" text-anchor="middle">guard_value</text>
  <text class="mut" x="661.8" y="194.0" font-size="10" text-anchor="middle">u64</text>
  <rect class="cell k3 dash" x="718.5" y="159" width="119.5" height="48" rx="3"/>
  <text class="fg" x="778.2" y="180.0" font-size="11.5" text-anchor="middle">kv</text>
  <text class="mut" x="778.2" y="194.0" font-size="10" text-anchor="middle">field metadata</text>
  <path class="s4" d="M495.7 224.0 L495.7 231.0 L716.5 231.0 L716.5 224.0"/>
  <text class="l4" x="606.1" y="246.0" font-size="10.5" text-anchor="middle">present if and only if field_flags bit 1 is set</text>
  <text class="t l4" x="40" y="265" font-size="11.5">This is the one place the grammar is not context-free: the parse of a field depends on a byte inside that field.</text>
  <text class="t fg" x="40" y="303" font-size="12.5" font-weight="600">field_flags</text>
  <rect class="cell k2" x="40.0" y="314" width="419.1" height="44" rx="3"/>
  <text class="fg" x="249.5" y="333.0" font-size="11.5" text-anchor="middle">bit 0</text>
  <text class="mut" x="249.5" y="347.0" font-size="10" text-anchor="middle">variable-length: the value lives in the tail, bit_width is 0</text>
  <rect class="cell k4" x="461.1" y="314" width="152.4" height="44" rx="3"/>
  <text class="fg" x="537.2" y="333.0" font-size="11.5" text-anchor="middle">bit 1</text>
  <text class="mut" x="537.2" y="347.0" font-size="10" text-anchor="middle">guarded</text>
  <rect class="cell cell dash" x="615.4" y="314" width="222.6" height="44" rx="3"/>
  <text class="fg" x="726.7" y="333.0" font-size="11.5" text-anchor="middle">bits 2..7</text>
  <text class="mut" x="726.7" y="347.0" font-size="10" text-anchor="middle">write 0</text>
  <text class="t fg" x="40" y="387" font-size="12.5" font-weight="600">data_type</text>
  <rect class="cell k2" x="40.0" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="96.1" y="415.0" font-size="11.5" text-anchor="middle">uint</text>
  <text class="mut" x="96.1" y="429.0" font-size="10" text-anchor="middle">0</text>
  <rect class="cell k2" x="154.3" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="210.4" y="415.0" font-size="11.5" text-anchor="middle">sint</text>
  <text class="mut" x="210.4" y="429.0" font-size="10" text-anchor="middle">1</text>
  <rect class="cell k2" x="268.6" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="324.7" y="415.0" font-size="11.5" text-anchor="middle">float</text>
  <text class="mut" x="324.7" y="429.0" font-size="10" text-anchor="middle">2</text>
  <rect class="cell k2" x="382.9" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="439.0" y="415.0" font-size="11.5" text-anchor="middle">bool</text>
  <text class="mut" x="439.0" y="429.0" font-size="10" text-anchor="middle">3</text>
  <rect class="cell k2" x="497.1" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="553.3" y="415.0" font-size="11.5" text-anchor="middle">bytes</text>
  <text class="mut" x="553.3" y="429.0" font-size="10" text-anchor="middle">4</text>
  <rect class="cell k2" x="611.4" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="667.6" y="415.0" font-size="11.5" text-anchor="middle">string</text>
  <text class="mut" x="667.6" y="429.0" font-size="10" text-anchor="middle">5</text>
  <rect class="cell k2" x="725.7" y="398" width="112.3" height="40" rx="3"/>
  <text class="fg" x="781.9" y="415.0" font-size="11.5" text-anchor="middle">complex</text>
  <text class="mut" x="781.9" y="429.0" font-size="10" text-anchor="middle">6</text>
  <text class="t mut" x="40" y="456" font-size="11.5">byte_order is 0 little, 1 big, and it is per field because a single CAN frame routinely mixes Intel and Motorola signals. Bit</text>
  <text class="t mut" x="40" y="473" font-size="11.5">numbering inside the record follows the field’s own byte_order. A variable-length field has bit_width 0, contributes nothing</text>
  <text class="t mut" x="40" y="490" font-size="11.5">to record_bits, and its bit_offset is ignored.</text>
</svg>
