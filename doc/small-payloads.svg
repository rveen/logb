<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 493" width="880" height="493" role="img" aria-label="The META, ATTACH, RUN and END payloads">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="493"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">META, ATTACH, RUN, END — the small payloads</text>
  <text class="t fg" x="40" y="72" font-size="12.5" font-weight="600">META — 0x11 — one key/value pair per frame</text>
  <rect class="cell k3 dash" x="40.0" y="83" width="398.0" height="42" rx="3"/>
  <text class="fg" x="239.0" y="101.0" font-size="11.5" text-anchor="middle">key</text>
  <text class="mut" x="239.0" y="115.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <rect class="cell k3 dash" x="440.0" y="83" width="398.0" height="42" rx="3"/>
  <text class="fg" x="639.0" y="101.0" font-size="11.5" text-anchor="middle">value</text>
  <text class="mut" x="639.0" y="115.0" font-size="10" text-anchor="middle">&lt;string&gt;</text>
  <text class="t mut" x="40" y="143" font-size="11">File-scoped when stream_id is 0, stream-scoped otherwise. Stream and field metadata live inline in the SCHEMA frame as &lt;kv&gt; instead.</text>
  <text class="t fg" x="40" y="181" font-size="12.5" font-weight="600">ATTACH — 0x12 — an embedded file: a DBC, a calibration, a netlist</text>
  <rect class="cell k3 dash" x="40.0" y="192" width="249.0" height="42" rx="3"/>
  <text class="fg" x="164.5" y="210.0" font-size="11.5" text-anchor="middle">attach_name</text>
  <text class="mut" x="164.5" y="224.0" font-size="10" text-anchor="middle">&lt;string&gt;, e.g. “engine.dbc”</text>
  <rect class="cell k1" x="291.0" y="192" width="139.2" height="42" rx="3"/>
  <text class="fg" x="360.6" y="210.0" font-size="11.5" text-anchor="middle">attach_len</text>
  <text class="mut" x="360.6" y="224.0" font-size="10" text-anchor="middle">u32</text>
  <rect class="cell k2 dash" x="432.2" y="192" width="405.8" height="42" rx="3"/>
  <text class="fg" x="635.1" y="210.0" font-size="11.5" text-anchor="middle">bytes × attach_len</text>
  <text class="mut" x="635.1" y="224.0" font-size="10" text-anchor="middle">the file, verbatim</text>
  <text class="t fg" x="40" y="269" font-size="12.5" font-weight="600">RUN — 0x13 — declares what a run_id means</text>
  <rect class="cell k1" x="40.0" y="280" width="222.0" height="42" rx="3"/>
  <text class="fg" x="151.0" y="298.0" font-size="11.5" text-anchor="middle">run_id</text>
  <text class="mut" x="151.0" y="312.0" font-size="10" text-anchor="middle">u32, the value DATA frames carry</text>
  <rect class="cell k1" x="264.0" y="280" width="222.0" height="42" rx="3"/>
  <text class="fg" x="375.0" y="298.0" font-size="11.5" text-anchor="middle">run_index</text>
  <text class="mut" x="375.0" y="312.0" font-size="10" text-anchor="middle">u32, ordinal within the sweep</text>
  <rect class="cell k3 dash" x="488.0" y="280" width="350.0" height="42" rx="3"/>
  <text class="fg" x="663.0" y="298.0" font-size="11.5" text-anchor="middle">kv</text>
  <text class="mut" x="663.0" y="312.0" font-size="10" text-anchor="middle">the parameter set: “R1”=“1.0e3”, “temp”=“27”</text>
  <text class="t mut" x="40" y="340" font-size="11">A logger writes run_id = 0 forever and never emits a RUN frame; the concept costs it four bytes per batch and no complexity.</text>
  <text class="t fg" x="40" y="378" font-size="12.5" font-weight="600">END — 0x40 — empty payload</text>
  <rect class="cell cell dash" x="40.0" y="389" width="798.0" height="36" rx="3"/>
  <text class="fg" x="439.0" y="411.0" font-size="11.5" text-anchor="middle">payload_len = 0 — nothing at all</text>
  <text class="t mut" x="40" y="443" font-size="11.5">An END frame states that a writer closed cleanly at that point: a statement about the past, not a command about the future. A</text>
  <text class="t mut" x="40" y="460" font-size="11.5">reader that finds bytes after one MUST continue scanning — which is exactly what a concatenated file looks like.</text>
</svg>
