<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 272" width="880" height="272" role="img" aria-label="The SYNC frame payload">
  <style>
    .bg   { fill: #ffffff; }
    .fg   { fill: #1f2328; }
    .mut  { fill: #656d76; }
    .cell { fill: #ffffff; stroke: #d0d7de; }
    .dash { stroke-dasharray: 4 3; }
    .axis { stroke: #8c959f; fill: none; }
    .k1   { fill: #0969da; fill-opacity: 0.12; stroke: #0969da; }
    .k2   { fill: #1a7f37; fill-opacity: 0.12; stroke: #1a7f37; }
    .k3   { fill: #8250df; fill-opacity: 0.12; stroke: #8250df; }
    .k4   { fill: #cf222e; fill-opacity: 0.12; stroke: #cf222e; }
    .k5   { fill: #9a6700; fill-opacity: 0.13; stroke: #9a6700; }
    .l1   { fill: #0969da; }
    .l2   { fill: #1a7f37; }
    .l3   { fill: #8250df; }
    .l4   { fill: #cf222e; }
    .l5   { fill: #9a6700; }
    .s1   { stroke: #0969da; fill: none; }
    .s4   { stroke: #cf222e; fill: none; }
    text  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .t    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #0d1117; }
      .fg   { fill: #e6edf3; }
      .mut  { fill: #8b949e; }
      .cell { fill: #0d1117; stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .k1   { fill: #79c0ff; fill-opacity: 0.15; stroke: #79c0ff; }
      .k2   { fill: #3fb950; fill-opacity: 0.15; stroke: #3fb950; }
      .k3   { fill: #d2a8ff; fill-opacity: 0.15; stroke: #d2a8ff; }
      .k4   { fill: #ff7b72; fill-opacity: 0.15; stroke: #ff7b72; }
      .k5   { fill: #d29922; fill-opacity: 0.16; stroke: #d29922; }
      .l1   { fill: #79c0ff; }
      .l2   { fill: #3fb950; }
      .l3   { fill: #d2a8ff; }
      .l4   { fill: #ff7b72; }
      .l5   { fill: #d29922; }
      .s1   { stroke: #79c0ff; fill: none; }
      .s4   { stroke: #ff7b72; fill: none; }
    }
  </style>
  <rect class="bg" width="880" height="272"/>
  <text class="t fg" x="40" y="30" font-size="15" font-weight="600">SYNC — 0x01 — 32-byte payload</text>
  <text class="t mut" x="40" y="49" font-size="12">&lt;sync-payload&gt; ::= &lt;sync-pattern&gt; &lt;segment-seq&gt; &lt;wall-time-ns&gt;</text>
  <rect class="cell k5" x="40.0" y="90" width="353.6" height="48" rx="3"/>
  <text class="mut" x="40.0" y="85" font-size="9.5">+0</text>
  <text class="fg" x="216.8" y="111.0" font-size="11.5" text-anchor="middle">sync_pattern</text>
  <text class="mut" x="216.8" y="125.0" font-size="10" text-anchor="middle">16 fixed bytes</text>
  <rect class="cell k1" x="395.6" y="90" width="220.2" height="48" rx="3"/>
  <text class="mut" x="395.6" y="85" font-size="9.5">+16</text>
  <text class="fg" x="505.7" y="111.0" font-size="11.5" text-anchor="middle">segment_seq</text>
  <text class="mut" x="505.7" y="125.0" font-size="10" text-anchor="middle">u64, monotonic from 0</text>
  <rect class="cell k1" x="617.8" y="90" width="220.2" height="48" rx="3"/>
  <text class="mut" x="617.8" y="85" font-size="9.5">+24</text>
  <text class="fg" x="727.9" y="111.0" font-size="11.5" text-anchor="middle">wall_time_ns</text>
  <text class="mut" x="727.9" y="125.0" font-size="10" text-anchor="middle">i64, 0 if unknown</text>
  <rect class="cell k5" x="40.0" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="50.1" y="172.0" font-size="9.5" text-anchor="middle">4C</text>
  <rect class="cell k5" x="62.2" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="72.3" y="172.0" font-size="9.5" text-anchor="middle">4F</text>
  <rect class="cell k5" x="84.4" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="94.6" y="172.0" font-size="9.5" text-anchor="middle">47</text>
  <rect class="cell k5" x="106.7" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="116.8" y="172.0" font-size="9.5" text-anchor="middle">42</text>
  <rect class="cell k5" x="128.9" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="139.0" y="172.0" font-size="9.5" text-anchor="middle">53</text>
  <rect class="cell k5" x="151.1" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="161.2" y="172.0" font-size="9.5" text-anchor="middle">59</text>
  <rect class="cell k5" x="173.3" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="183.4" y="172.0" font-size="9.5" text-anchor="middle">4E</text>
  <rect class="cell k5" x="195.6" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="205.7" y="172.0" font-size="9.5" text-anchor="middle">43</text>
  <rect class="cell k5" x="217.8" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="227.9" y="172.0" font-size="9.5" text-anchor="middle">A7</text>
  <rect class="cell k5" x="240.0" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="250.1" y="172.0" font-size="9.5" text-anchor="middle">3E</text>
  <rect class="cell k5" x="262.2" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="272.3" y="172.0" font-size="9.5" text-anchor="middle">91</text>
  <rect class="cell k5" x="284.4" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="294.6" y="172.0" font-size="9.5" text-anchor="middle">D2</text>
  <rect class="cell k5" x="306.7" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="316.8" y="172.0" font-size="9.5" text-anchor="middle">5C</text>
  <rect class="cell k5" x="328.9" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="339.0" y="172.0" font-size="9.5" text-anchor="middle">68</text>
  <rect class="cell k5" x="351.1" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="361.2" y="172.0" font-size="9.5" text-anchor="middle">0B</text>
  <rect class="cell k5" x="373.3" y="154" width="20.2" height="28" rx="3"/>
  <text class="fg" x="383.4" y="172.0" font-size="9.5" text-anchor="middle">F4</text>
  <text class="mut" x="40" y="198.0" font-size="10.5">L O G B S Y N C, then 8 random bytes &#8212; long enough that it cannot plausibly occur inside record data</text>
  <text class="t mut" x="40" y="222" font-size="11.5">A reader that has lost its place scans for this pattern, steps back 8 bytes to the frame header, validates the CRC, and is</text>
  <text class="t mut" x="40" y="239" font-size="11.5">synchronised. Every schema binding expires here, so nothing before a SYNC frame is needed to decode anything after it.</text>
</svg>
